<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>THE BOOK NOOK Student Portal</title>
    <style>
      :root {
        --bg: #f5f4d6;
        --surface: #fffdf9;
        --text: #334155;
        --border: #e8e2d8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Segoe UI', sans-serif;
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .title {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.03em;
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 7px 10px;
        background: #fff;
        color: var(--text);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .btn:hover {
        background: #f8fafc;
      }

      .inline-btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 7px 10px;
        background: #fff;
        color: var(--text);
        font-size: 0.85rem;
        font-weight: 700;
      }

      iframe {
        width: 100%;
        height: calc(100vh - 53px);
        border: 0;
        display: block;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <h1 class="title">THE BOOK NOOK Student Portal</h1>
      <div class="actions">
        <button class="inline-btn" type="button" id="reload-student-portal">Reload Portal</button>
        <a class="btn" href="./dist/student.html?v=20260414a" target="_blank" rel="noopener noreferrer">Open Fullscreen</a>
        <a class="btn" href="./Library.html">Open Staff Portal</a>
      </div>
    </header>
    <iframe
      id="student-portal-frame"
      src="./dist/student.html?v=20260414a"
      title="THE BOOK NOOK Student Portal"
      loading="eager"
    ></iframe>
    <script>
      const iframe = document.getElementById('student-portal-frame');
      const reloadBtn = document.getElementById('reload-student-portal');

      reloadBtn?.addEventListener('click', () => {
        if (!iframe) return;
        iframe.src = iframe.src;
      });
    </script>
  </body>
</html>
