<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>THE BOOK NOOK</title>
    <style>
      :root {
        --bg: #f5f4d6;
        --surface: #fffdf9;
        --text: #334155;
        --muted: #6b7280;
        --border: #e8e2d8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Segoe UI', sans-serif;
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .title {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.03em;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 7px 10px;
        background: #fff;
        color: var(--text);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 700;
      }

      iframe {
        width: 100%;
        height: calc(100vh - 53px);
        border: 0;
        display: block;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <h1 class="title">THE BOOK NOOK</h1>
      <div class="actions">
        <a class="btn" href="./">Back to Marksheet</a>
        <a class="btn" href="./Library-vault.html">Open Vault Page</a>
      </div>
    </header>
    <iframe src="./library-app/index.html" title="THE BOOK NOOK" loading="eager"></iframe>
  </body>
</html>
