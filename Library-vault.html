<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Library Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --danger: #ff7b72;
        --ok: #3fb950;
        --accent: #2f81f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #111827 0%, var(--bg) 55%);
        color: var(--text);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .shell {
        width: min(1080px, 92vw);
        margin: 40px auto;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        background: linear-gradient(180deg, #1b2230 0%, var(--panel) 100%);
        padding: 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
      }

      p {
        color: var(--muted);
        margin: 8px 0;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 16px;
      }

      input {
        flex: 1;
        background: #0f1724;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--text);
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }

      button.secondary {
        background: #283447;
      }

      .status {
        margin-top: 12px;
        font-size: 0.95rem;
        min-height: 1.2em;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--ok);
      }

      #appWrap {
        display: none;
        margin-top: 16px;
      }

      iframe {
        width: 100%;
        height: 85vh;
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        background: #fff;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>Library Vault</h1>
        <p>Owner-only access is required to open this page.</p>
        <p id="who" class="hidden"></p>

        <div id="gateArea">
          <p>Enter your private passphrase to unlock the Library Tracker.</p>
          <div class="row">
            <input id="secretInput" type="password" autocomplete="off" placeholder="Private passphrase" />
            <button id="unlockBtn">Unlock</button>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div id="appWrap">
          <div class="toolbar">
            <p>Vault unlocked for this browser tab.</p>
            <div class="row" style="margin-top: 0">
              <button id="lockBtn" class="secondary" type="button">Lock</button>
              <button id="homeBtn" class="secondary" type="button">Back to Marksheet</button>
            </div>
          </div>
          <iframe id="libraryFrame" src="./library-app/index.html" title="THE BOOK NOOK" loading="eager"></iframe>
        </div>
      </section>
    </main>

    <script>
      const SUPABASE_URL = 'https://pvwcdesafxxkosdrfjwa.supabase.co';
      const SUPABASE_ANON_KEY =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2d2NkZXNhZnh4a29zZHJmandhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg0NzY3NDIsImV4cCI6MjA3NDA1Mjc0Mn0.qaSGzdLMCbYNO1KQPCZJrCrk0AEtesKvt2kHXJ_IVH8';

      const ALLOWED_LIBRARY_EMAILS = new Set(['admin@marksheetpro.com', 'jaycee.molina@gmail.com']);
      const SECRET_HASH_HEX = '9bed3905e9c47e8485b8570d87ef9a80f5f9d81d1a9d23534b7942f5823825e2';

      const TAB_UNLOCK_KEY = 'marksheet_private_library_unlocked';
      const ENTRY_TICKET_KEY = 'marksheet_library_entry_ticket';
      const MAX_FAILED_ATTEMPTS = 3;
      const REDIRECT_DELAY_MS = 1500;
      let failedAttempts = 0;

      const gateArea = document.getElementById('gateArea');
      const appWrap = document.getElementById('appWrap');
      const statusEl = document.getElementById('status');
      const whoEl = document.getElementById('who');
      const secretInput = document.getElementById('secretInput');
      const unlockBtn = document.getElementById('unlockBtn');
      const lockBtn = document.getElementById('lockBtn');
      const homeBtn = document.getElementById('homeBtn');

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      function showApp() {
        gateArea.style.display = 'none';
        appWrap.style.display = 'block';
      }

      function showGate() {
        appWrap.style.display = 'none';
        gateArea.style.display = 'block';
      }

      async function sha256Hex(value) {
        const data = new TextEncoder().encode(value);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash))
          .map((b) => b.toString(16).padStart(2, '0'))
          .join('');
      }

      async function checkAuthorizedSession() {
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data } = await supabaseClient.auth.getSession();
        const email = data?.session?.user?.email || '';

        if (!email) {
          setStatus('Sign in first on Marksheet Pro, then open this page again.', 'error');
          unlockBtn.disabled = true;
          return false;
        }

        whoEl.classList.remove('hidden');
        whoEl.textContent = `Signed in as: ${email}`;

        if (!ALLOWED_LIBRARY_EMAILS.has(email.toLowerCase())) {
          setStatus('Access denied for this account.', 'error');
          unlockBtn.disabled = true;
          return false;
        }

        return true;
      }

      unlockBtn.addEventListener('click', async () => {
        const phrase = secretInput.value.trim();
        if (!phrase) {
          setStatus('Enter your passphrase.', 'error');
          return;
        }

        unlockBtn.disabled = true;
        try {
          const hash = await sha256Hex(phrase);
          if (hash !== SECRET_HASH_HEX) {
            failedAttempts += 1;
            const attemptsLeft = MAX_FAILED_ATTEMPTS - failedAttempts;

            if (attemptsLeft <= 0) {
              unlockBtn.disabled = true;
              secretInput.disabled = true;
              setStatus('Too many failed attempts. Redirecting to home...', 'error');
              window.setTimeout(() => {
                window.location.href = './';
              }, REDIRECT_DELAY_MS);
              return;
            }

            setStatus(`Incorrect passphrase. ${attemptsLeft} attempt(s) left.`, 'error');
            return;
          }

          failedAttempts = 0;
          sessionStorage.setItem(TAB_UNLOCK_KEY, '1');
          secretInput.value = '';
          setStatus('Vault unlocked.', 'success');
          showApp();
        } finally {
          unlockBtn.disabled = false;
        }
      });

      secretInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') unlockBtn.click();
      });

      lockBtn.addEventListener('click', () => {
        sessionStorage.removeItem(TAB_UNLOCK_KEY);
        failedAttempts = 0;
        secretInput.disabled = false;
        unlockBtn.disabled = false;
        showGate();
        setStatus('Vault locked.', '');
      });

      homeBtn.addEventListener('click', () => {
        window.location.href = './';
      });

      (async function init() {
        const allowed = await checkAuthorizedSession();
        if (!allowed) return;

        const openedFromLibraryButton = sessionStorage.getItem(ENTRY_TICKET_KEY) === '1';
        if (openedFromLibraryButton) {
          sessionStorage.removeItem(ENTRY_TICKET_KEY);
          sessionStorage.setItem(TAB_UNLOCK_KEY, '1');
          showApp();
          setStatus('Vault auto-unlocked from Marksheet button.', 'success');
          return;
        }

        if (sessionStorage.getItem(TAB_UNLOCK_KEY) === '1') {
          showApp();
          setStatus('Vault already unlocked in this tab.', 'success');
        }
      })();
    </script>
  </body>
</html>
